<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A cheerful offline multiplication practice game for children learning 1x1 to 9x9 tables.">
  <meta name="theme-color" content="#4da3ff">
  <meta name="color-scheme" content="light">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Rocket Math">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <title>Multiplication Rocket</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon.png">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
  <main class="game-shell" id="app">
    <header class="hero">
      <div class="rocket-badge" aria-hidden="true">&#128640;</div>
      <div>
        <h1>Multiplication Rocket</h1>
        <p>Practice times tables and launch your rocket to the stars.</p>
      </div>
    </header>

    <section id="start-screen" class="panel" aria-labelledby="start-title">
      <div class="screen-heading">
        <div>
          <h2 id="start-title">Pick a mission</h2>
          <p id="saved-progress" class="saved-progress" aria-live="polite">Loading saved progress...</p>
        </div>
        <button id="reset-progress-button" class="text-button" type="button">Reset progress</button>
      </div>

      <div class="level-grid" role="group" aria-label="Choose difficulty level">
        <button class="level-card" type="button" data-level="easy" aria-label="Easy level, tables 1 to 5">
          <span>Easy</span>
          <small>Tables 1 to 5</small>
        </button>
        <button class="level-card" type="button" data-level="medium" aria-label="Medium level, tables 1 to 7">
          <span>Medium</span>
          <small>Tables 1 to 7</small>
        </button>
        <button class="level-card" type="button" data-level="hard" aria-label="Hard level, tables 1 to 9">
          <span>Hard</span>
          <small>Tables 1 to 9</small>
        </button>
      </div>

      <div id="weak-tables" class="weak-tables" aria-live="polite"></div>
    </section>

    <section id="game-screen" class="panel hidden" aria-labelledby="question-text">
      <div class="stats" aria-label="Game progress">
        <div><span>Question</span><strong><span id="question-number">1</span>/10</strong></div>
        <div><span>Stars</span><strong id="score">0</strong></div>
        <div><span>Time</span><strong><span id="timer">0</span>s</strong></div>
      </div>

      <div class="rocket-area" aria-hidden="true">
        <div class="sky-mark star-one">&#9733;</div>
        <div class="sky-mark star-two">&#9733;</div>
        <div class="sky-mark star-three">&#9733;</div>
        <div id="rocket">&#128640;</div>
      </div>

      <h2 id="question-text" class="question"></h2>
      <div id="answer-buttons" class="answer-grid" aria-label="Answer choices"></div>

      <button id="hint-button" class="secondary-button" type="button">Show hint</button>
      <p id="hint-text" class="hint" aria-live="polite"></p>
      <p id="message" class="message" aria-live="assertive"></p>
    </section>

    <section id="result-screen" class="panel hidden" aria-labelledby="result-title">
      <h2 id="result-title">Mission complete! &#11088;</h2>
      <p id="result-message" class="result-message" aria-live="polite"></p>
      <div class="result-stats">
        <div><span>Stars earned</span><strong id="final-score"></strong></div>
        <div><span>Best score</span><strong id="best-score"></strong></div>
        <div><span>Time</span><strong><span id="final-time"></span>s</strong></div>
      </div>

      <h3>Practice review</h3>
      <div id="wrong-review" class="review-list"></div>
      <button id="play-again-button" type="button">Play again</button>
    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/questions.js"></script>
  <script src="./js/animation.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
